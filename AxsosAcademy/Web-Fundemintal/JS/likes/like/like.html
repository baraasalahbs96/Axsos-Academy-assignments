<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Likes</title>
    <link rel="stylesheet" href="like.css">
</head>
<body>
    <nav>
        <h1 class="network">Network</h1>
    </nav>
    <main>
<!-- title -->
        <h2 class="title">Your Feed</h2>
        <div class="container">
<!-- profile card -->
            <div class="profile-card">
                <img src="user-circle.png" alt="user">
                <a href="#">Add an avatar</a>
                <h3>James Doe</h3>
            </div>
<!-- right side -->
<!-- 3 boxes -->
            <div class="boxes">
<!-- box1 -->
                <div class="box">
                    <div class="header">
                        <h3>Neil M</h3>
                        <p><span id="likes1">9</span> like(s)</p>
                        <button onclick="addLike1()">Like</button>
                    </div>
                    <p class="body">I just set up this new discord bot, let me know what you all think. <a
                            href="#">link</a></p>
                </div>
<!-- box2 -->
                <div class="box">
                    <div class="header">
                        <h3>Nichole K</h3>
                        <p><span id="likes2">12</span> like(s)</p>
                        <button onclick="addLike2()">Like</button>
                    </div>
                    <p class="body">Just finished my <a href="">next comic</a>, check it out.</p>
                </div>
<!-- box3 -->
                <div class="box">
                    <div class="header">
                        <h3>Jim R</h3>
                        <p><span id="likes3">9</span> like(s)</p>
                        <button onclick="addLike3()">Like</button>
                    </div>
                    <p class="body">I can't stop listening to the <a href="">new album</a>. Who else is liking it?</p>
                </div>
            </div>
        </div>
    </main>

</body>
<script src="like.js"></script>
</html>
