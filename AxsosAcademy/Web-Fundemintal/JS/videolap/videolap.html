<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VideoLap</title>
    <link rel="stylesheet" href="videolap.css">
</head>
<body>
<!--  -->
  <div class="navbar">
    <h1>VideoLab</h1>
    <input type="text" placeholder="Search">
    <button>Login</button>
  </div>
<!--  -->
  <div class="container">
<!--  -->
    <div class="video-section">
      <video id="blossomVideo" src="video.mp4.mp4" muted> </video>
      <h2>Example Video Title</h2>
      <p>1.3K views | June 18, 2021</p>
<!--  -->
      <div class="user">
        <img src="user-circle.png" alt="user pic">
        <span> Example User Name</span>
      </div>
      <div>
        <button class="subscribe">Subscribe</button>
      </div>
    </div>
<!--  -->
    <div class="sidebar">
      <h3>Up Next</h3>

      <div class="item">
        <img src="video-placeholder.png" alt="video pic">
        <p>Not a Rick Roll</p>
      </div>

      <div class="item">
        <img src="video-placeholder.png" alt="video pic">
        <p>10 Facts About ET's Cat</p>
      </div>

      <div class="item">
        <img src="video-placeholder.png" alt="video pic">
        <p>5 Cosplay Tips</p>
      </div>

      <div class="item">
        <img src="video-placeholder.png" alt="video pic">
        <p>Boy Battles Dinobot</p>
      </div>

    </div>

  </div>
  <script src="videolap.js"></script>
</body>
</html>
